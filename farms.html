<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beechland Farms - Farms</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/dist/umd/supabase.min.js"></script>
    <script src="supabase.js"></script>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f7f2;
            color: #2d3a20;
        }

        header {
            background: linear-gradient(135deg, #2d5016 0%, #4a7c2c 100%);
            padding: 1.5rem 2rem;
            color: #fff;
        }

        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        .nav-bar a {
            color: #fff;
            text-decoration: none;
            margin-left: 1.5rem;
        }

        .nav-bar a:hover {
            text-decoration: underline;
        }

        .container {
            max-width: 1100px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        h1 {
            font-size: 2.8rem;
            margin-bottom: 0.5rem;
        }

        p.lead {
            color: #4d5c3d;
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }

        .farm-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .farm-card {
            background: #fff;
            border: 1px solid #d9e0c5;
            border-radius: 12px;
            box-shadow: 0 6px 18px rgba(45, 80, 22, 0.08);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            position: relative;
        }

        .farm-card h2 {
            margin-top: 0;
            color: #2d5016;
        }

        .farm-card p {
            line-height: 1.7;
            color: #555;
        }

        .top-controls {
            margin-bottom: 1.5rem;
        }

        .back-link {
            display: inline-block;
            margin-top: 2rem;
            padding: 0.8rem 1.2rem;
            background: #a8d65e;
            color: #2d5016;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
        }

        .back-link:hover {
            background: #8bc34a;
        }

        .farm-delete {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 1px solid #e0e0e0;
            background: #fff;
            color: #a00;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .farm-delete:hover {
            background: #fee;
        }

        @media (max-width: 768px) {
            .nav-bar {
                flex-direction: column;
                align-items: flex-start;
            }

            .nav-bar a {
                margin: 0.5rem 0 0 0;
            }

            h1 {
                font-size: 2.2rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <div class="logo">
                <div class="logo-name">🌾 Beechland Farms</div>
                <div class="logo-subtitle">Farms directory</div>
            </div>
            <nav class="main-nav">
                <a href="index.html">Home</a>
                <a href="farms.html">Farms</a>
            </nav>
        </div>
    </header>

    <div class="container">
        <h1>Our Farms</h1>
        <p class="lead">Discover the farms that make Beechland Farms special. Below are the locations currently featured on our site.</p>

        <div class="top-controls">
            <a class="back-link" href="index.html">Back to Home</a>
        </div>

        <div id="debug-panel" style="margin-top:1rem;">
            <button id="refresh-farms" class="btn-small">Refresh farms</button>
            <div id="debug-output" style="margin-top:0.8rem;color:#6b7a51;font-style:italic;"></div>
        </div>

        <div id="farms-list" class="farm-list">
            <!-- Farms will be loaded here from IndexedDB -->
        </div>

    </div>

    <script>
        function createFarmCard(farm) {
            const card = document.createElement('div');
            card.className = 'farm-card';

            const title = document.createElement('h2');
            title.textContent = farm.name || 'Unnamed Farm';
            card.appendChild(title);

            const p = document.createElement('p');
            const link = document.createElement('a');
            link.className = 'back-link';
            link.style.background = '#4a7c2c';
            link.style.color = '#fff';
            link.style.display = 'inline-block';
            link.style.marginTop = '1rem';
            link.textContent = 'View Fields';
            link.href = `fields.html?farmId=${encodeURIComponent(farm.id)}`;
            p.appendChild(link);
            card.appendChild(p);
            return card;
        }

        function showDebug(farms, source) {
            const out = document.getElementById('debug-output');
            if (!out) return;
            out.textContent = `Farms loaded from ${source}: ${farms.length}\n` + JSON.stringify(farms.map(f => ({ id: f.id, name: f.name })), null, 2);
        }

        async function loadAndRender() {
            try {
                const farms = await fetchFarms();
                const container = document.getElementById('farms-list');
                container.innerHTML = '';
                if (!farms.length) {
                    container.innerHTML = '<div class="empty-state">No farms yet. Add one from the home page.</div>';
                } else {
                    farms.forEach(farm => container.appendChild(createFarmCard(farm)));
                }
                showDebug(farms, supabaseEnabled() ? 'Supabase' : 'local storage');
            } catch (error) {
                console.error(error);
                const container = document.getElementById('farms-list');
                container.innerHTML = '<div class="empty-state">Unable to load farms.</div>';
                showDebug([], 'error');
            }
        }

        window.addEventListener('load', () => {
            loadAndRender();
            document.getElementById('refresh-farms').addEventListener('click', loadAndRender);
        });
    </script>
</body>
</html>
